<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>render viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; overflow: hidden; }
  #viewer { width: 100vw; height: 100vh; display: block; }

  #hud {
    position: fixed; top: 16px; left: 16px;
    background: rgba(0,0,0,0.6); padding: 10px 14px; border-radius: 6px;
    font-size: 13px; line-height: 1.6; pointer-events: none;
    max-width: 360px;
  }
  #hud .file { color: #7fdbca; }
  #hud .status { color: #999; }
  #hud .waiting { color: #f0c674; }

  #axes-helper {
    position: fixed; bottom: 16px; left: 16px;
    width: 100px; height: 100px;
    pointer-events: none;
  }

  /* Gallery panel */
  #gallery-panel {
    position: fixed; top: 0; left: 0; width: 240px; height: 100vh;
    background: #12121f; border-right: 1px solid #2a2a44;
    display: flex; flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
    z-index: 10;
  }
  #gallery-panel.open { transform: translateX(0); }

  #gallery-panel header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid #2a2a44;
    font-size: 13px; color: #7fdbca; flex-shrink: 0;
  }
  #gallery-panel header button {
    background: none; border: none; color: #999; cursor: pointer;
    font-size: 16px; font-family: monospace;
  }
  #gallery-panel header button:hover { color: #e0e0e0; }

  #gallery-list {
    flex: 1; overflow-y: auto; padding: 6px 0;
  }
  #gallery-list::-webkit-scrollbar { width: 4px; }
  #gallery-list::-webkit-scrollbar-thumb { background: #2a2a44; border-radius: 2px; }

  .gallery-item {
    padding: 8px 14px; cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.15s;
  }
  .gallery-item:hover { background: rgba(127,219,202,0.08); }
  .gallery-item.active {
    background: rgba(127,219,202,0.12);
    border-left-color: #7fdbca;
  }
  .gallery-item .gi-name {
    font-size: 13px; color: #e0e0e0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .gallery-item .gi-meta {
    font-size: 11px; color: #666; margin-top: 2px;
  }

  #gallery-empty {
    padding: 20px 14px; color: #555; font-size: 12px;
    text-align: center;
  }

  /* Shift elements when gallery is open */
  #gallery-panel.open ~ #hud { left: 256px; }
  #gallery-panel.open ~ #axes-helper { left: 256px; }
  #gallery-panel.open ~ #menu-wrap #toggle-gallery { background: rgba(127,219,202,0.15); }

  /* Code panel */
  #code-panel {
    position: fixed; top: 0; right: 0; width: 420px; height: 100vh;
    background: #12121f; border-left: 1px solid #2a2a44;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    z-index: 10;
  }
  #code-panel.open { transform: translateX(0); }

  #code-panel header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid #2a2a44;
    font-size: 13px; color: #7fdbca; flex-shrink: 0;
  }
  #code-panel header button {
    background: none; border: none; color: #999; cursor: pointer;
    font-size: 16px; font-family: monospace;
  }
  #code-panel header button:hover { color: #e0e0e0; }

  #code-editor {
    flex: 1; padding: 12px; font-family: monospace; font-size: 13px;
    background: #0d0d18; color: #c5c8c6; border: none; resize: none;
    line-height: 1.5; tab-size: 4;
    outline: none;
  }

  #code-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-top: 1px solid #2a2a44;
    flex-shrink: 0;
  }
  #run-btn {
    background: #2d6a4f; color: #e0e0e0; border: none; border-radius: 4px;
    padding: 6px 16px; font-family: monospace; font-size: 13px;
    cursor: pointer;
  }
  #run-btn:hover { background: #3a8963; }
  #run-btn:disabled { background: #333; color: #666; cursor: wait; }
  #run-status { font-size: 12px; color: #999; }
  #run-status.error { color: #cc6666; }

  /* Top-right hamburger menu */
  #menu-wrap {
    position: fixed; top: 16px; right: 16px;
    z-index: 11;
  }
  #code-panel.open ~ #menu-wrap { right: 436px; }

  #menu-toggle {
    background: rgba(0,0,0,0.6); border: 1px solid #2a2a44;
    color: #7fdbca; font-family: monospace; font-size: 18px;
    padding: 6px 12px; border-radius: 4px; cursor: pointer;
    line-height: 1;
  }
  #menu-toggle:hover { background: rgba(0,0,0,0.8); }
  #menu-toggle.active { background: rgba(127,219,202,0.15); }

  #top-buttons {
    position: absolute; top: calc(100% + 6px); right: 0;
    display: none; flex-direction: column; gap: 4px;
    background: rgba(0,0,0,0.85); border: 1px solid #2a2a44;
    border-radius: 6px; padding: 6px; min-width: 160px;
  }
  #menu-wrap.open #top-buttons { display: flex; }

  #top-buttons button {
    background: transparent; border: 1px solid transparent;
    color: #7fdbca; font-family: monospace; font-size: 13px;
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    text-align: left;
  }
  #top-buttons button:hover { background: rgba(127,219,202,0.08); border-color: #2a2a44; }
  #top-buttons button:disabled { color: #555; cursor: default; }
  #top-buttons button:disabled:hover { background: transparent; border-color: transparent; }
  #top-buttons button.active { background: rgba(127,219,202,0.15); border-color: #2a2a44; }

  /* Slice panel */
  #slice-panel {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); border: 1px solid #2a2a44;
    border-radius: 6px; padding: 10px 14px;
    display: none; align-items: center; gap: 10px;
    font-size: 12px; color: #e0e0e0; z-index: 11;
  }
  #slice-panel.open { display: flex; }
  #slice-panel .axis-btns { display: flex; gap: 4px; }
  #slice-panel .axis-btns button {
    background: #12121f; border: 1px solid #2a2a44; color: #999;
    font-family: monospace; font-size: 12px; width: 24px; height: 24px;
    border-radius: 3px; cursor: pointer;
  }
  #slice-panel .axis-btns button.active { background: #2d6a4f; color: #e0e0e0; border-color: #3a8963; }
  #slice-panel input[type="range"] { width: 220px; }
  #slice-panel #slice-flip {
    background: #12121f; border: 1px solid #2a2a44; color: #999;
    font-family: monospace; font-size: 12px; padding: 4px 8px;
    border-radius: 3px; cursor: pointer;
  }
  #slice-panel #slice-value { color: #7fdbca; min-width: 60px; text-align: right; }

  /* Edit mode: area selection */
  #selection-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9;
  }
  body.selecting #selection-overlay { pointer-events: auto; cursor: crosshair; }
  body.selecting #viewer { cursor: crosshair; }

  #selection-rect {
    position: absolute;
    display: none;
    border: 2px solid #ff3355;
    background: rgba(255, 51, 85, 0.08);
    pointer-events: none;
  }

  #edit-modal {
    position: fixed;
    display: none;
    background: #12121f;
    border: 1px solid #2a2a44;
    border-radius: 6px;
    padding: 10px;
    width: 280px;
    z-index: 20;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
  }
  #edit-modal .hint {
    font-size: 11px; color: #7fdbca; margin-bottom: 6px;
  }
  #edit-prompt {
    width: 100%; background: #0d0d18; color: #e0e0e0;
    border: 1px solid #2a2a44; border-radius: 4px;
    padding: 6px 8px; font-family: monospace; font-size: 12px;
    resize: vertical; min-height: 52px; outline: none;
  }
  #edit-prompt:focus { border-color: #7fdbca; }
  #edit-modal-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; gap: 8px;
  }
  #edit-modal-bar button {
    background: #2d6a4f; color: #e0e0e0; border: none; border-radius: 4px;
    padding: 5px 12px; font-family: monospace; font-size: 12px;
    cursor: pointer;
  }
  #edit-modal-bar button:hover { background: #3a8963; }
  #edit-modal-bar button:disabled { background: #333; color: #666; cursor: wait; }
  #edit-modal-bar .cancel {
    background: transparent; color: #888;
  }
  #edit-modal-bar .cancel:hover { background: rgba(255,255,255,0.05); color: #e0e0e0; }
  #edit-status { font-size: 11px; color: #cc6666; margin-top: 6px; min-height: 14px; }

  #edit-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .edit-chip {
    background: rgba(127,219,202,0.07); border: 1px solid rgba(127,219,202,0.22);
    color: #7fdbca; font-family: monospace; font-size: 10px;
    padding: 2px 8px; border-radius: 10px; cursor: pointer; white-space: nowrap;
  }
  .edit-chip:hover { background: rgba(127,219,202,0.18); }

  #edit-toast {
    position: fixed; top: 70px; right: 16px;
    padding: 10px 14px;
    background: #12121f; border: 1px solid #2d6a4f; border-radius: 6px;
    display: none; flex-direction: column; gap: 2px;
    z-index: 20;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
    font-size: 12px; color: #7fdbca;
    transition: opacity 0.25s;
  }
  #edit-toast.show { display: flex; }
  #edit-toast.fade { opacity: 0; }
  #edit-toast .hint { color: #666; font-size: 10px; }
  #code-panel.open ~ #edit-toast { right: 436px; }

  /* Dimension labels */
  .dim-label {
    position: fixed;
    background: rgba(0,0,0,0.72);
    color: #7fdbca;
    font-family: monospace;
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid rgba(127,219,202,0.35);
    pointer-events: none;
    white-space: nowrap;
    transform: translate(-50%, -50%);
    display: none;
  }
</style>
</head>
<body>

<canvas id="viewer"></canvas>

<div id="gallery-panel">
  <header>
    <span>models</span>
    <button id="close-gallery">&times;</button>
  </header>
  <div id="gallery-list">
    <div id="gallery-empty">no models yet</div>
  </div>
</div>

<div id="hud">
  <div class="waiting">waiting for model...</div>
  <div class="status">polling /models/</div>
</div>
<canvas id="axes-helper"></canvas>

<div id="code-panel">
  <header>
    <span id="code-panel-title">script.py</span>
    <button id="close-code">&times;</button>
  </header>
  <textarea id="code-editor" spellcheck="false" placeholder="# build123d code will appear here when a model is rendered..."></textarea>
  <div id="code-bar">
    <button id="run-btn">Run (Ctrl+Enter)</button>
    <span id="run-status"></span>
  </div>
</div>
<div id="slice-panel">
  <span>axis</span>
  <div class="axis-btns">
    <button data-axis="x">X</button>
    <button data-axis="y" class="active">Y</button>
    <button data-axis="z">Z</button>
  </div>
  <input id="slice-slider" type="range" min="-1" max="1" step="0.001" value="0">
  <span id="slice-value">0.0 mm</span>
  <button id="slice-flip" title="Flip clip direction">&#x21C4;</button>
</div>

<div id="menu-wrap">
  <button id="menu-toggle" title="Menu" aria-label="Menu">&#9776;</button>
  <div id="top-buttons">
    <button id="toggle-gallery" title="Model gallery">&#x25A6; models</button>
    <button id="render-mode" title="Cycle: solid / wireframe / x-ray">&#x25A0; solid</button>
    <button id="toggle-slice" title="Cross-section slice">&#x2702; slice</button>
    <button id="toggle-dims" title="Toggle dimension annotations">&#x25A1; dims</button>
    <button id="edit-area" title="Select an area to edit with Claude">&#x270E; edit</button>
    <button id="download-step" disabled title="Export STEP file">&#x2B73; STEP</button>
    <button id="toggle-code">&lt;/&gt; code</button>
    <button id="shutdown-server" title="Stop the viewer server">&#x23FB; stop</button>
  </div>
</div>

<div id="selection-overlay">
  <div id="selection-rect"></div>
</div>

<div id="edit-modal">
  <div class="hint">describe the change for the selected area</div>
  <textarea id="edit-prompt" placeholder="e.g. make this hole larger"></textarea>
  <div id="edit-chips">
    <button class="edit-chip">make this larger</button>
    <button class="edit-chip">make this smaller</button>
    <button class="edit-chip">add a fillet here</button>
    <button class="edit-chip">add a hole here</button>
    <button class="edit-chip">increase thickness</button>
    <button class="edit-chip">remove this feature</button>
  </div>
  <div id="edit-status"></div>
  <div id="edit-modal-bar">
    <button class="cancel" id="edit-cancel">cancel</button>
    <button id="edit-send">send &#x23CE;</button>
  </div>
</div>

<div id="edit-toast">
  <div><span id="edit-toast-text">&#x2713; edit queued &mdash; Claude will apply it</span></div>
  <div class="hint">tip: run <code>/loop /render apply pending edits</code> once per session to auto-apply</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// Main scene
const canvas = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x1a1a2e);
renderer.localClippingEnabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.08;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(3, 3, 3);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Soft 3-point studio lighting with cool-tone color grading
scene.add(new THREE.HemisphereLight(0xd3dde6, 0x090c16, 1.62));

const keyLight = new THREE.DirectionalLight(0xd6e0ea, 0.82);
keyLight.position.set(2.2, -2.0, 3.2);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x6b7f95, 0.46);
fillLight.position.set(-3, 1.2, 1.4);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.04);
rimLight.position.set(0, 5, -5);
scene.add(rimLight);

// PMREM environment for reflections on MeshStandardMaterial
const pmremGenerator = new THREE.PMREMGenerator(renderer);
scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
pmremGenerator.dispose();

// Grid
scene.add(new THREE.GridHelper(10, 20, 0x333355, 0x222244));

// Axes helper in corner
const axesCanvas = document.getElementById('axes-helper');
const axesRenderer = new THREE.WebGLRenderer({ canvas: axesCanvas, alpha: true, antialias: true });
axesRenderer.setPixelRatio(window.devicePixelRatio);
axesRenderer.setSize(100, 100);
const axesScene = new THREE.Scene();
const axesCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 10);
axesScene.add(new THREE.AxesHelper(1));

// HUD
const hud = document.getElementById('hud');
function updateHud(file, status) {
  hud.innerHTML = '';
  if (file) {
    const f = document.createElement('div');
    f.className = 'file';
    f.textContent = file;
    hud.appendChild(f);
  }
  const s = document.createElement('div');
  s.className = status === 'waiting' ? 'waiting' : 'status';
  s.textContent = status === 'waiting' ? 'waiting for model...' : status;
  hud.appendChild(s);
}

// Model loading
const loader = new GLTFLoader();
let currentModel = null;
let currentFile = null;
let modelVersion = 0;
let activeModelName = null;

function loadModel(url, filename) {
  loader.load(url, (gltf) => {
    if (currentModel) scene.remove(currentModel);
    currentModel = gltf.scene;

    const box = new THREE.Box3().setFromObject(currentModel);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 2;

    currentModel.position.sub(center);
    scene.add(currentModel);

    camera.position.set(dist, dist * 0.8, dist);
    camera.lookAt(0, 0, 0);
    controls.target.set(0, 0, 0);
    controls.update();

    currentFile = filename;
    // glTF uses meters, build123d exports in mm → convert back
    const mm = (v) => (v * 1000).toFixed(1);
    const dims = `${mm(size.x)} x ${mm(size.y)} x ${mm(size.z)} mm`;
    updateHud(filename, dims);
    document.getElementById('code-panel-title').textContent = filename.replace(/\.glb$/, '.py');
    if (dimsEnabled) buildDimLabels(size);

    // Update slice bounds from centered model half-extents
    sliceState.bounds.x = size.x / 2;
    sliceState.bounds.y = size.y / 2;
    sliceState.bounds.z = size.z / 2;
    refreshSliceSlider();
    updateSlicePlane();

    // Re-apply current render mode to new model
    savedMaterials.clear();
    applyRenderMode();

    // Build stencil cap helpers for slice mode and apply current clip state
    rebuildSliceHelpers();
    applyClippingToModel();
  });
}

// Slice / clipping plane with stencil capping (solid cross-section)
const AXIS_VEC = { x: new THREE.Vector3(1,0,0), y: new THREE.Vector3(0,1,0), z: new THREE.Vector3(0,0,1) };
const sliceState = {
  enabled: false,
  axis: 'y',
  value: 0,      // in three.js units (meters)
  flip: 1,       // +1 or -1
  plane: new THREE.Plane(new THREE.Vector3(0,1,0), 0),
  bounds: { x: 1, y: 1, z: 1 },  // half-extent per axis, in meters
  stencilMeshes: [],  // back/front stencil-write helpers (children of originals)
  capMesh: null,       // fullscreen-ish plane that draws the cap color where stencil != 0
};

function updateSlicePlane() {
  const n = AXIS_VEC[sliceState.axis].clone().multiplyScalar(sliceState.flip);
  sliceState.plane.set(n, -n.dot(AXIS_VEC[sliceState.axis].clone().multiplyScalar(sliceState.value)));
  positionCapMesh();
}

function positionCapMesh() {
  if (!sliceState.capMesh) return;
  const p = sliceState.plane;
  const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), p.normal);
  sliceState.capMesh.quaternion.copy(q);
  sliceState.capMesh.position.copy(p.normal).multiplyScalar(-p.constant);
}

function disposeSliceHelpers() {
  for (const m of sliceState.stencilMeshes) {
    if (m.parent) m.parent.remove(m);
    m.material.dispose();
  }
  sliceState.stencilMeshes = [];
  if (sliceState.capMesh) {
    scene.remove(sliceState.capMesh);
    sliceState.capMesh.geometry.dispose();
    sliceState.capMesh.material.dispose();
    sliceState.capMesh = null;
  }
}

function rebuildSliceHelpers() {
  // No helpers needed — model has real infill geometry, plain clipping
  // is sufficient to reveal the cross-section.
  disposeSliceHelpers();
}

function applyClippingToModel() {
  if (!currentModel) return;
  const planes = sliceState.enabled ? [sliceState.plane] : [];
  currentModel.traverse((child) => {
    if (!child.isMesh || child.userData.isSliceHelper) return;
    child.material.clippingPlanes = planes;
    child.material.side = sliceState.enabled ? THREE.DoubleSide : THREE.FrontSide;
    child.material.clipShadows = true;
    child.material.needsUpdate = true;
  });
}

// Render mode: solid → wireframe → xray → solid
const RENDER_MODES = ['solid', 'wireframe', 'xray'];
const RENDER_LABELS = { solid: '\u25A0 solid', wireframe: '\u25A1 wire', xray: '\u25C7 x-ray' };
let renderMode = 'solid';
let savedMaterials = new Map();

const renderModeBtn = document.getElementById('render-mode');
renderModeBtn.addEventListener('click', () => {
  const idx = RENDER_MODES.indexOf(renderMode);
  renderMode = RENDER_MODES[(idx + 1) % RENDER_MODES.length];
  renderModeBtn.textContent = RENDER_LABELS[renderMode];
  applyRenderMode();
});

function applyRenderMode() {
  if (!currentModel) return;

  currentModel.traverse((child) => {
    if (!child.isMesh || child.userData.isSliceHelper) return;

    // Save original material on first encounter
    if (!savedMaterials.has(child.uuid)) {
      savedMaterials.set(child.uuid, child.material.clone());
    }
    const original = savedMaterials.get(child.uuid);

    // Remove any previous feature-edge overlay — rebuilt below if needed
    if (child.userData.edgeLines) {
      child.remove(child.userData.edgeLines);
      child.userData.edgeLines.geometry.dispose();
      child.userData.edgeLines.material.dispose();
      child.userData.edgeLines = null;
    }

    if (renderMode === 'solid') {
      child.material = original.clone();
      child.material.wireframe = false;
      child.material.transparent = false;
      child.material.opacity = 1.0;
      child.material.depthWrite = true;
      child.material.side = THREE.FrontSide;
      child.visible = true;
    } else if (renderMode === 'wireframe') {
      // Show feature edges (sharp creases) instead of every mesh triangle.
      // EdgesGeometry with a 20° threshold hides the coplanar diagonals that
      // the glTF tessellator inserts across flat faces, so the wire view
      // matches the model's actual geometry.
      child.material = original.clone();
      child.material.wireframe = false;
      child.material.transparent = true;
      child.material.opacity = 0.0;
      child.material.depthWrite = false;
      child.visible = true;
      const edgesGeom = new THREE.EdgesGeometry(child.geometry, 20);
      const lineMat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        clippingPlanes: sliceState.enabled ? [sliceState.plane] : [],
      });
      const lines = new THREE.LineSegments(edgesGeom, lineMat);
      child.add(lines);
      child.userData.edgeLines = lines;
    } else if (renderMode === 'xray') {
      child.material = original.clone();
      child.material.wireframe = false;
      child.material.transparent = true;
      child.material.opacity = 0.25;
      child.material.depthWrite = false;
      child.material.side = THREE.DoubleSide;
    }

    child.material.clippingPlanes = sliceState.enabled ? [sliceState.plane] : [];
    child.material.clipShadows = true;
    child.material.needsUpdate = true;
  });
}

// Slice UI wiring
const slicePanel = document.getElementById('slice-panel');
const sliceBtn = document.getElementById('toggle-slice');
const sliceSlider = document.getElementById('slice-slider');
const sliceValueLabel = document.getElementById('slice-value');
const sliceFlipBtn = document.getElementById('slice-flip');
const axisBtns = slicePanel.querySelectorAll('.axis-btns button');

function refreshSliceSlider() {
  const half = sliceState.bounds[sliceState.axis];
  sliceSlider.min = -half;
  sliceSlider.max = half;
  sliceSlider.step = Math.max(half / 500, 0.0001);
  // Clamp current value
  if (sliceState.value > half) sliceState.value = half;
  if (sliceState.value < -half) sliceState.value = -half;
  sliceSlider.value = sliceState.value;
  sliceValueLabel.textContent = (sliceState.value * 1000).toFixed(1) + ' mm';
}

sliceBtn.addEventListener('click', () => {
  sliceState.enabled = !sliceState.enabled;
  slicePanel.classList.toggle('open', sliceState.enabled);
  sliceBtn.classList.toggle('active', sliceState.enabled);
  refreshSliceSlider();
  updateSlicePlane();
  applyClippingToModel();
});

axisBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    sliceState.axis = btn.dataset.axis;
    axisBtns.forEach(b => b.classList.toggle('active', b === btn));
    refreshSliceSlider();
    updateSlicePlane();
    applyClippingToModel();
  });
});

sliceSlider.addEventListener('input', () => {
  sliceState.value = parseFloat(sliceSlider.value);
  sliceValueLabel.textContent = (sliceState.value * 1000).toFixed(1) + ' mm';
  updateSlicePlane();
});

sliceFlipBtn.addEventListener('click', () => {
  sliceState.flip *= -1;
  updateSlicePlane();
});

// Poll for latest model + code
async function poll() {
  try {
    const resp = await fetch('/api/latest');
    const data = await resp.json();
    if (data.file && data.version !== modelVersion) {
      modelVersion = data.version;
      activeModelName = data.file.replace(/\.glb$/, '');
      loadModel('/models/' + data.file + '?t=' + Date.now(), data.file);
      if (galleryPanel.classList.contains('open')) refreshGallery();
      // Load the source code
      if (data.code) {
        const editor = document.getElementById('code-editor');
        // Only update if user hasn't modified the code
        if (!editor.dataset.dirty) {
          editor.value = data.code;
        }
      }
    }
    // Update STEP download button
    currentStep = data.step || null;
    stepBtn.disabled = !currentStep;
    if (!currentFile) updateHud(null, 'waiting');
  } catch (e) {
    // server not ready
  }
}
setInterval(poll, 1000);
poll();

// STEP download
const stepBtn = document.getElementById('download-step');
let currentStep = null;

stepBtn.addEventListener('click', () => {
  if (currentStep) {
    window.location.href = '/api/download/' + currentStep;
  }
});

// Code panel toggle
const panel = document.getElementById('code-panel');
// Hamburger menu toggle
const menuWrap = document.getElementById('menu-wrap');
const menuToggle = document.getElementById('menu-toggle');
menuToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  menuWrap.classList.toggle('open');
  menuToggle.classList.toggle('active');
});
document.addEventListener('click', (e) => {
  if (!menuWrap.contains(e.target)) {
    menuWrap.classList.remove('open');
    menuToggle.classList.remove('active');
  }
});

const toggleBtn = document.getElementById('toggle-code');
const closeBtn = document.getElementById('close-code');
const editor = document.getElementById('code-editor');
const runBtn = document.getElementById('run-btn');
const runStatus = document.getElementById('run-status');

toggleBtn.addEventListener('click', () => {
  panel.classList.toggle('open');
  resizeViewer();
});
closeBtn.addEventListener('click', () => {
  panel.classList.remove('open');
  resizeViewer();
});

const shutdownBtn = document.getElementById('shutdown-server');
shutdownBtn.addEventListener('click', async () => {
  if (!confirm('Stop the viewer server? The page will stop loading updates.')) return;
  shutdownBtn.disabled = true;
  try {
    await fetch('/api/shutdown', { method: 'POST' });
  } catch (_) { /* expected — the server may close the connection */ }
  document.body.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;' +
    'height:100vh;font-family:monospace;color:#7fdbca;font-size:14px;">' +
    'viewer stopped — safe to close this tab</div>';
});

// Track if user has edited
editor.addEventListener('input', () => {
  editor.dataset.dirty = 'true';
});

// Run code
async function runCode() {
  runBtn.disabled = true;
  runStatus.textContent = 'running...';
  runStatus.className = '';
  editor.dataset.dirty = '';

  try {
    const resp = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: editor.value, model: activeModelName }),
    });
    const data = await resp.json();
    if (data.ok) {
      runStatus.textContent = `done (${data.time})`;
      runStatus.className = '';
      // Force reload
      modelVersion = -1;
      poll();
    } else {
      runStatus.textContent = data.error;
      runStatus.className = 'error';
    }
  } catch (e) {
    runStatus.textContent = 'server error';
    runStatus.className = 'error';
  } finally {
    runBtn.disabled = false;
  }
}

runBtn.addEventListener('click', runCode);
editor.addEventListener('keydown', (e) => {
  // Ctrl/Cmd + Enter to run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
  // Tab inserts spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 4;
    editor.dataset.dirty = 'true';
  }
});

// Gallery panel
const galleryPanel = document.getElementById('gallery-panel');
const galleryToggleBtn = document.getElementById('toggle-gallery');
const galleryCloseBtn = document.getElementById('close-gallery');
const galleryList = document.getElementById('gallery-list');
const galleryEmpty = document.getElementById('gallery-empty');

galleryToggleBtn.addEventListener('click', () => {
  galleryPanel.classList.toggle('open');
  if (galleryPanel.classList.contains('open')) refreshGallery();
  resizeViewer();
});
galleryCloseBtn.addEventListener('click', () => {
  galleryPanel.classList.remove('open');
  resizeViewer();
});

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function formatTime(ms) {
  const d = new Date(ms);
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function refreshGallery() {
  try {
    const resp = await fetch('/api/list');
    const data = await resp.json();
    const models = data.models || [];

    if (models.length === 0) {
      galleryEmpty.style.display = '';
      return;
    }
    galleryEmpty.style.display = 'none';

    // Keep existing items and only update if list changed
    const existingNames = [...galleryList.querySelectorAll('.gallery-item')].map(el => el.dataset.name);
    const newNames = models.map(m => m.name);
    const changed = existingNames.length !== newNames.length || existingNames.some((n, i) => n !== newNames[i]);
    if (!changed) {
      // Just update active state
      galleryList.querySelectorAll('.gallery-item').forEach(el => {
        el.classList.toggle('active', el.dataset.name === activeModelName);
      });
      return;
    }

    galleryList.innerHTML = '';
    for (const m of models) {
      const item = document.createElement('div');
      item.className = 'gallery-item' + (m.name === activeModelName ? ' active' : '');
      item.dataset.name = m.name;
      item.innerHTML = `
        <div class="gi-name">${m.name}</div>
        <div class="gi-meta">${formatTime(m.mtime)} &middot; ${formatSize(m.size)}</div>
      `;
      item.addEventListener('click', () => loadGalleryModel(m));
      galleryList.appendChild(item);
    }
  } catch (e) {
    // server not ready
  }
}

async function loadGalleryModel(m) {
  activeModelName = m.name;
  document.getElementById('code-panel-title').textContent = m.name + '.py';
  loadModel('/models/' + m.file + '?t=' + Date.now(), m.file);

  // Update active highlight
  galleryList.querySelectorAll('.gallery-item').forEach(el => {
    el.classList.toggle('active', el.dataset.name === m.name);
  });

  // Update STEP button
  currentStep = m.step || null;
  stepBtn.disabled = !currentStep;

  // Load this model's script into the code editor
  try {
    const resp = await fetch('/api/model/' + m.name);
    const data = await resp.json();
    if (data.code) {
      editor.value = data.code;
      editor.dataset.dirty = '';
    }
  } catch (e) {}
}

// Refresh gallery periodically when open
setInterval(() => {
  if (galleryPanel.classList.contains('open')) refreshGallery();
}, 3000);

// Edit mode — select an area and send it to Claude
const editBtn = document.getElementById('edit-area');
const selOverlay = document.getElementById('selection-overlay');
const selRectEl = document.getElementById('selection-rect');
const editModal = document.getElementById('edit-modal');
const editPrompt = document.getElementById('edit-prompt');
const editSendBtn = document.getElementById('edit-send');
const editCancelBtn = document.getElementById('edit-cancel');
const editStatus = document.getElementById('edit-status');
const editToast = document.getElementById('edit-toast');
let editToastTimer = null;

function showEditToast() {
  editToast.classList.remove('fade');
  editToast.classList.add('show');
  clearTimeout(editToastTimer);
  editToastTimer = setTimeout(() => {
    editToast.classList.add('fade');
    setTimeout(() => editToast.classList.remove('show', 'fade'), 300);
  }, 4000);
}

let editMode = false;
let selStart = null;
let selRect = null;

function enterEditMode() {
  editMode = true;
  editBtn.classList.add('active');
  document.body.classList.add('selecting');
  controls.enabled = false;
}

function exitEditMode() {
  editMode = false;
  editBtn.classList.remove('active');
  document.body.classList.remove('selecting');
  controls.enabled = true;
  selRectEl.style.display = 'none';
  editModal.style.display = 'none';
  selRect = null;
  selStart = null;
  editStatus.textContent = '';
}

editBtn.addEventListener('click', () => {
  if (editMode) exitEditMode(); else enterEditMode();
});

selOverlay.addEventListener('mousedown', (e) => {
  if (!editMode) return;
  selStart = { x: e.clientX, y: e.clientY };
  Object.assign(selRectEl.style, {
    left: e.clientX + 'px', top: e.clientY + 'px',
    width: '0px', height: '0px', display: 'block',
  });
  editModal.style.display = 'none';
});

selOverlay.addEventListener('mousemove', (e) => {
  if (!editMode || !selStart) return;
  const x = Math.min(selStart.x, e.clientX);
  const y = Math.min(selStart.y, e.clientY);
  const w = Math.abs(e.clientX - selStart.x);
  const h = Math.abs(e.clientY - selStart.y);
  Object.assign(selRectEl.style, {
    left: x + 'px', top: y + 'px',
    width: w + 'px', height: h + 'px',
  });
});

selOverlay.addEventListener('mouseup', (e) => {
  if (!editMode || !selStart) return;
  const x = Math.min(selStart.x, e.clientX);
  const y = Math.min(selStart.y, e.clientY);
  const w = Math.abs(e.clientX - selStart.x);
  const h = Math.abs(e.clientY - selStart.y);
  selStart = null;
  if (w < 10 || h < 10) {
    selRectEl.style.display = 'none';
    return;
  }
  selRect = { x, y, w, h };
  // Place modal next to the selection, keep it on screen
  const modalW = 280, modalH = 160;
  let mx = x + w + 12, my = y;
  if (mx + modalW > window.innerWidth - 10) mx = Math.max(10, x - modalW - 12);
  if (my + modalH > window.innerHeight - 10) my = window.innerHeight - modalH - 10;
  Object.assign(editModal.style, {
    left: mx + 'px', top: my + 'px', display: 'block',
  });
  editPrompt.value = '';
  editStatus.textContent = '';
  editPrompt.focus();
});

async function sendEdit() {
  if (!selRect) return;
  const prompt = editPrompt.value.trim();
  if (!prompt) {
    editStatus.textContent = 'enter an instruction first';
    return;
  }

  const canvasRect = canvas.getBoundingClientRect();
  // Canvas pixel scale (drawing buffer vs CSS size)
  const sx = canvas.width / canvasRect.width;
  const sy = canvas.height / canvasRect.height;
  const relX = Math.max(0, (selRect.x - canvasRect.left) * sx);
  const relY = Math.max(0, (selRect.y - canvasRect.top) * sy);
  const relW = Math.min(canvas.width - relX, selRect.w * sx);
  const relH = Math.min(canvas.height - relY, selRect.h * sy);

  // Fresh render so the drawing buffer is current
  renderer.render(scene, camera);

  const composite = document.createElement('canvas');
  composite.width = canvas.width;
  composite.height = canvas.height;
  const ctx = composite.getContext('2d');
  ctx.drawImage(canvas, 0, 0);
  ctx.strokeStyle = '#ff3355';
  ctx.lineWidth = Math.max(3, Math.round(4 * sx));
  ctx.strokeRect(relX, relY, relW, relH);

  const imageB64 = composite.toDataURL('image/png');

  editSendBtn.disabled = true;
  editSendBtn.textContent = 'sending...';
  editStatus.textContent = '';

  try {
    const resp = await fetch('/api/edit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image: imageB64,
        prompt,
        model: activeModelName,
        rect: { x: relX, y: relY, w: relW, h: relH },
      }),
    });
    const data = await resp.json();
    if (data.ok) {
      showEditToast();
      exitEditMode();
    } else {
      editStatus.textContent = data.error || 'server error';
    }
  } catch (err) {
    editStatus.textContent = 'network error';
  } finally {
    editSendBtn.disabled = false;
    editSendBtn.textContent = 'send \u23CE';
  }
}

editSendBtn.addEventListener('click', sendEdit);
editCancelBtn.addEventListener('click', exitEditMode);
document.querySelectorAll('.edit-chip').forEach(chip => {
  chip.addEventListener('click', () => { editPrompt.value = chip.textContent; editPrompt.focus(); });
});
editPrompt.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendEdit(); }
  else if (e.key === 'Escape') { exitEditMode(); }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && editMode) exitEditMode();
});

// ─── Dimension annotations ───────────────────────────────────────────────────
const dimsToggleBtn = document.getElementById('toggle-dims');
let dimsEnabled = false;
let dimsBox3Helper = null;
const dimLabelEls = [];
const dimLabelPositions = [];

function buildDimLabels(size) {
  removeDimLabels();
  // Bounding box wireframe — model is centered at origin after loadModel
  const half = new THREE.Vector3(size.x / 2, size.y / 2, size.z / 2);
  const box3 = new THREE.Box3(half.clone().negate(), half.clone());
  dimsBox3Helper = new THREE.Box3Helper(box3, 0x7fdbca);
  dimsBox3Helper.material.transparent = true;
  dimsBox3Helper.material.opacity = 0.55;
  scene.add(dimsBox3Helper);

  const mm = (v) => (v * 1000).toFixed(1);
  const off = Math.max(size.x, size.y, size.z) * 0.12;
  // Label positions: mid of each axis edge, offset outward so they don't overlap the box
  const specs = [
    { text: `W  ${mm(size.x)} mm`, pos: new THREE.Vector3(0,               -half.y - off, half.z + off) },
    { text: `D  ${mm(size.y)} mm`, pos: new THREE.Vector3(half.x + off,    0,             half.z + off) },
    { text: `H  ${mm(size.z)} mm`, pos: new THREE.Vector3(half.x + off,   -half.y - off,  0           ) },
  ];
  for (const spec of specs) {
    const el = document.createElement('div');
    el.className = 'dim-label';
    el.textContent = spec.text;
    document.body.appendChild(el);
    dimLabelEls.push(el);
    dimLabelPositions.push(spec.pos.clone());
  }
}

function removeDimLabels() {
  for (const el of dimLabelEls) el.remove();
  dimLabelEls.length = 0;
  dimLabelPositions.length = 0;
  if (dimsBox3Helper) {
    scene.remove(dimsBox3Helper);
    dimsBox3Helper.geometry.dispose();
    dimsBox3Helper.material.dispose();
    dimsBox3Helper = null;
  }
}

const _dimTmp = new THREE.Vector3();
function updateDimLabelPositions() {
  if (!dimsEnabled || dimLabelEls.length === 0) return;
  const w = renderer.domElement.clientWidth;
  const h = renderer.domElement.clientHeight;
  for (let i = 0; i < dimLabelEls.length; i++) {
    _dimTmp.copy(dimLabelPositions[i]).project(camera);
    if (_dimTmp.z > 1) { dimLabelEls[i].style.display = 'none'; continue; }
    dimLabelEls[i].style.display = 'block';
    dimLabelEls[i].style.left = ((_dimTmp.x * 0.5 + 0.5) * w) + 'px';
    dimLabelEls[i].style.top  = ((-_dimTmp.y * 0.5 + 0.5) * h) + 'px';
  }
}

dimsToggleBtn.addEventListener('click', () => {
  dimsEnabled = !dimsEnabled;
  dimsToggleBtn.classList.toggle('active', dimsEnabled);
  if (dimsEnabled && currentModel) {
    const box = new THREE.Box3().setFromObject(currentModel);
    buildDimLabels(box.getSize(new THREE.Vector3()));
  } else {
    removeDimLabels();
  }
});

// Resize viewer when panel opens/closes
function resizeViewer() {
  let w = window.innerWidth;
  if (panel.classList.contains('open')) w -= 420;
  if (galleryPanel.classList.contains('open')) w -= 240;
  renderer.setSize(w, window.innerHeight);
  camera.aspect = w / window.innerHeight;
  camera.updateProjectionMatrix();
}

// Render loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  updateDimLabelPositions();
  axesCamera.position.copy(camera.position).normalize().multiplyScalar(2.5);
  axesCamera.lookAt(0, 0, 0);
  axesRenderer.render(axesScene, axesCamera);
}
animate();

window.addEventListener('resize', () => {
  resizeViewer();
});
</script>
